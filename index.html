<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRIP Model — Radar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f6f5f0;--surface:#fff;--surface-alt:#edecea;
  --text:#2a2926;--text-muted:#7a7870;--text-faint:#a8a49c;
  --accent:#7F77DD;--accent-dark:#534AB7;--accent-light:#EEEDFE;
  --border:#e2e0da;--border-strong:#ccc9c1;
  --radius:14px;--radius-sm:8px;
}
body{
  font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;padding:2rem 1rem;
}
.app-shell{max-width:1080px;margin:0 auto}
.header{margin-bottom:2.5rem}
.header h1{
  font-family:'DM Serif Display',serif;font-size:2rem;font-weight:400;
  letter-spacing:-0.02em;margin-bottom:0.25rem;
}
.header p{color:var(--text-muted);font-size:0.95rem}

.layout{display:grid;grid-template-columns:1fr 1fr;gap:2rem;align-items:start}
@media(max-width:800px){.layout{grid-template-columns:1fr}}

.chart-wrap{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:2rem 1.5rem;position:relative;
}
.chart-container{position:relative;width:100%;max-width:440px;margin:0 auto;aspect-ratio:1}

.facets-panel{display:flex;flex-direction:column;gap:1rem}

.facet-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:1.25rem 1.5rem;transition:border-color .2s,box-shadow .2s;cursor:default;
}
.facet-card:hover{border-color:var(--border-strong);box-shadow:0 2px 12px rgba(0,0,0,.04)}
.facet-card.active{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light)}

.facet-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.facet-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);flex-shrink:0}
.facet-name{font-weight:600;font-size:0.95rem;flex:1}
.facet-pct{
  font-size:0.85rem;font-weight:600;color:var(--accent-dark);
  background:var(--accent-light);padding:2px 10px;border-radius:20px;
  min-width:48px;text-align:center;
}

.slider-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.slider-row input[type=range]{
  flex:1;-webkit-appearance:none;appearance:none;height:6px;
  border-radius:3px;background:var(--surface-alt);outline:none;
}
.slider-row input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:20px;height:20px;border-radius:50%;
  background:var(--accent);cursor:pointer;border:3px solid var(--surface);
  box-shadow:0 1px 4px rgba(0,0,0,.15);
}
.slider-row input[type=range]::-moz-range-thumb{
  width:20px;height:20px;border-radius:50%;background:var(--accent);
  cursor:pointer;border:3px solid var(--surface);box-shadow:0 1px 4px rgba(0,0,0,.15);
}

.notes-area{
  width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:10px 12px;font-family:'DM Sans',system-ui,sans-serif;font-size:0.85rem;
  color:var(--text);background:var(--surface-alt);resize:vertical;min-height:60px;
  line-height:1.5;transition:border-color .2s;
}
.notes-area:focus{outline:none;border-color:var(--accent)}
.notes-area::placeholder{color:var(--text-faint)}

.avg-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--accent-light);color:var(--accent-dark);
  font-weight:600;font-size:0.9rem;padding:6px 16px;
  border-radius:20px;margin-top:1rem;
}

.export-bar{
  margin-top:2rem;display:flex;gap:12px;flex-wrap:wrap;
}
.btn{
  font-family:'DM Sans',system-ui,sans-serif;font-size:0.85rem;font-weight:600;
  padding:10px 20px;border-radius:var(--radius-sm);border:1px solid var(--border);
  background:var(--surface);color:var(--text);cursor:pointer;
  transition:all .15s;
}
.btn:hover{background:var(--surface-alt);border-color:var(--border-strong)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover{background:var(--accent-dark)}

.toast{
  position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--text);color:var(--bg);padding:12px 24px;border-radius:var(--radius-sm);
  font-size:0.85rem;font-weight:500;opacity:0;transition:all .3s ease;pointer-events:none;z-index:99;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app-shell">
  <div class="header">
    <h1>GRIP Model</h1>
    <p>Pas de percentages aan en voeg opmerkingen toe per facet.</p>
  </div>
  <div class="layout">
    <div>
      <div class="chart-wrap">
        <div class="chart-container">
          <canvas id="gripRadar"></canvas>
        </div>
        <div style="text-align:center">
          <div class="avg-badge" id="avgBadge">Gemiddeld: 51%</div>
        </div>
      </div>
      <div class="export-bar">
        <button class="btn primary" onclick="exportJSON()">Exporteer JSON</button>
        <button class="btn" onclick="copyMarkdown()">Kopieer als tekst</button>
      </div>
    </div>
    <div class="facets-panel" id="facetsPanel"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const FACETS = [
  {id:'blvc', name:'BLVC plan', value:40, notes:''},
  {id:'verg', name:'Vergunningen', value:65, notes:''},
  {id:'cond', name:'Conditionering', value:40, notes:''},
  {id:'stak', name:'Stakeholdermanagement', value:70, notes:''},
  {id:'mobi', name:'Mobiliteit', value:40, notes:''},
  {id:'comm', name:'Communicatie', value:50, notes:''},
];

const COLORS = ['#7F77DD','#1D9E75','#D85A30','#D4537E','#378ADD','#639922'];

let chart;

function initChart(){
  const ctx = document.getElementById('gripRadar');
  chart = new Chart(ctx, {
    type:'radar',
    data:{
      labels: FACETS.map(f=>f.name),
      datasets:[{
        data: FACETS.map(f=>f.value),
        backgroundColor:'rgba(127,119,221,0.15)',
        borderColor:'#7F77DD',
        borderWidth:2.5,
        pointBackgroundColor: COLORS,
        pointBorderColor: COLORS,
        pointRadius:6,
        pointHoverRadius:9,
        pointBorderWidth:2,
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:true,
      animation:{duration:300,easing:'easeOutCubic'},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'#fff',
          titleColor:'#2a2926',
          bodyColor:'#7a7870',
          borderColor:'#e2e0da',
          borderWidth:1,
          padding:12,
          cornerRadius:10,
          titleFont:{family:'DM Sans',weight:'600'},
          bodyFont:{family:'DM Sans'},
          callbacks:{label:c=>c.raw+'%'}
        }
      },
      scales:{
        r:{
          min:0,max:100,
          beginAtZero:true,
          ticks:{
            stepSize:20,
            color:'#a8a49c',
            font:{size:11,family:'DM Sans'},
            backdropColor:'transparent',
            callback:v=>v+'%'
          },
          grid:{color:'rgba(0,0,0,0.06)',lineWidth:1},
          angleLines:{color:'rgba(0,0,0,0.04)',lineWidth:1},
          pointLabels:{
            color:'#5a5850',
            font:{size:12.5,family:'DM Sans',weight:'500'},
            padding:16
          }
        }
      }
    }
  });
}

function buildCards(){
  const panel = document.getElementById('facetsPanel');
  panel.innerHTML = '';
  FACETS.forEach((f,i)=>{
    const card = document.createElement('div');
    card.className = 'facet-card';
    card.id = 'card-'+f.id;
    card.innerHTML = `
      <div class="facet-top">
        <div class="facet-dot" style="background:${COLORS[i]}"></div>
        <div class="facet-name">${f.name}</div>
        <div class="facet-pct" id="pct-${f.id}">${f.value}%</div>
      </div>
      <div class="slider-row">
        <input type="range" min="0" max="100" step="5" value="${f.value}"
          id="slider-${f.id}" oninput="updateValue('${f.id}',${i},this.value)">
      </div>
      <textarea class="notes-area" placeholder="Opmerkingen..."
        id="notes-${f.id}" oninput="updateNotes('${f.id}',this.value)">${f.notes}</textarea>
    `;
    panel.appendChild(card);
  });
}

function updateValue(id, idx, val){
  val = parseInt(val);
  const facet = FACETS.find(f=>f.id===id);
  facet.value = val;
  document.getElementById('pct-'+id).textContent = val+'%';
  chart.data.datasets[0].data = FACETS.map(f=>f.value);
  chart.update('none');
  updateAvg();
  save();
}

function updateNotes(id, text){
  FACETS.find(f=>f.id===id).notes = text;
  save();
}

function updateAvg(){
  const avg = Math.round(FACETS.reduce((s,f)=>s+f.value,0)/FACETS.length);
  document.getElementById('avgBadge').textContent = 'Gemiddeld: '+avg+'%';
}

function save(){
  try{ localStorage.setItem('grip-data', JSON.stringify(FACETS)); }catch(e){}
}
function load(){
  try{
    const d = JSON.parse(localStorage.getItem('grip-data'));
    if(d && d.length===6){
      d.forEach((saved,i)=>{
        FACETS[i].value = saved.value;
        FACETS[i].notes = saved.notes || '';
      });
    }
  }catch(e){}
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function exportJSON(){
  const data = FACETS.map(f=>({facet:f.name,percentage:f.value,opmerkingen:f.notes}));
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'grip-model.json';
  a.click();
  showToast('JSON geëxporteerd');
}

function copyMarkdown(){
  const lines = FACETS.map(f=>{
    let s = `${f.name}: ${f.value}%`;
    if(f.notes.trim()) s += `\n  → ${f.notes.trim().replace(/\n/g,'\n  → ')}`;
    return s;
  });
  const avg = Math.round(FACETS.reduce((s,f)=>s+f.value,0)/FACETS.length);
  const text = `GRIP Model\n${'─'.repeat(30)}\n${lines.join('\n\n')}\n\nGemiddeld: ${avg}%`;
  navigator.clipboard.writeText(text).then(()=>showToast('Gekopieerd naar klembord'));
}

load();
initChart();
buildCards();
updateAvg();
</script>
</body>
</html>
